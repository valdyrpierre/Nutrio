<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="login.css">
        <link rel="icon" type="image/x-icon" href="Nutrio_Logo.jpg">
        <title>Nutrio Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <header>
        <h1>Nutrio Login</h1>
        <img src="Nutrio_Logo.jpg" alt="Nutrio Logo">
        <p>Welcome back! Please log in to your account.</p>
    </header>
    <main>
        <form id="loginForm">
            <label for="username">Email or Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter your email or username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>  
            <button type="submit">Login</button>
            <button type="button" onclick="location.href='help.html';">Forgot Password?</button>
        </form>
 <p>Don't have an account? <button type="button" onclick="location.href='createaccount.html';">Create one here</button>. Or <button type="button" onclick="location.href='guest.html';">continue as a guest</button>.</p>
    </main>

    <footer>
        <p>&copy; 2025 Nutrio. All rights reserved.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://chtwudgjgbyxtmnhpdqr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_SjyNldGYLNmbI9-n3RmPWA_molD5Eph';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function lookupEmailByUsername(username) {
            const { data, error } = await supabaseClient
                .from('users')
                .select('email')
                .eq('username', username)
                .maybeSingle();

            if (error || !data || !data.email) {
                return null;
            }

            return data.email;
        }

        async function loadProfileByAuthId(authUserId) {
            const candidateColumns = ['auth_user_id', 'user_id', 'supabase_user_id', 'auth_id', 'id'];

            for (const column of candidateColumns) {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('firstname,lastname,username,email,age,gender,height,weight,fitness_goal,activity_level')
                    .eq(column, authUserId)
                    .maybeSingle();

                if (!error && data) {
                    return data;
                }

                if (error && !/column .* does not exist/i.test(error.message) && !/could not find the .* column/i.test(error.message) && !/invalid input syntax for type bigint/i.test(error.message)) {
                    console.warn('Profile lookup failed on column', column, error.message);
                }
            }

            return null;
        }

        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const usernameInput = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!usernameInput || !password) {
                alert('Please enter your username and password.');
                return;
            }

            try {
                // Look up the email associated with this username
                let email = usernameInput;
                if (!usernameInput.includes('@')) {
                    const lookedUpEmail = await lookupEmailByUsername(usernameInput);

                    if (!lookedUpEmail) {
                        alert('Username lookup is unavailable for this account. Please use your email address to log in.');
                        return;
                    }

                    email = lookedUpEmail;
                }

                // Sign in with Supabase Auth
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

                if (error) {
                    alert(error.message || 'Invalid credentials. Please try again.');
                    return;
                }

                const session = data.session;
                const authUser = data.user;

                const profile = await loadProfileByAuthId(authUser.id);
                const authMetadata = authUser.user_metadata || {};

                localStorage.setItem('nutrioUser', JSON.stringify({
                    id: authUser.id,
                    username: profile?.username || authMetadata.username || authUser.email,
                    email: profile?.email || authUser.email,
                    firstname: profile?.firstname || authMetadata.firstname || '',
                    lastname: profile?.lastname || authMetadata.lastname || '',
                    age: profile?.age ?? authMetadata.age ?? null,
                    gender: profile?.gender || authMetadata.gender || '',
                    height: profile?.height ?? authMetadata.height ?? null,
                    weight: profile?.weight ?? authMetadata.weight ?? null,
                    fitness_goal: profile?.fitness_goal || authMetadata.fitness_goal || '',
                    activity_level: profile?.activity_level || authMetadata.activity_level || ''
                }));
                localStorage.setItem('nutrioToken', session.access_token);
                localStorage.setItem('nutrioRefreshToken', session.refresh_token);

                alert('Login successful!');
                window.location.href = 'logedin.html';
            } catch (error) {
                console.error('Login error:', error);
                alert('An unexpected error occurred during login.');
            }
        });
    </script>
</html>
