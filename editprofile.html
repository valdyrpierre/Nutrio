<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="editprofile.css">
        <title>Nutrio - Edit Profile</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header>
            <h1>Edit Your Profile</h1>
        </header>
        <main>
            <section>
                <form id="edit-profile-form">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="age">Age:</label>
                    <input type="number" id="age" name="age" required>

                    <label>Height:</label>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <input type="number" id="height-ft" name="height-ft" placeholder="ft" min="3" max="8" style="width:70px;">
                        <span>ft</span>
                        <input type="number" id="height-in" name="height-in" placeholder="in" min="0" max="11" style="width:70px;">
                        <span>in</span>
                    </div>

                    <label for="weight">Weight (lbs):</label>
                    <input type="number" id="weight" name="weight" placeholder="e.g., 155" min="66" max="660" step="0.1" required>
                </form>
            </section>
        </main>
    </body>
        <footer>
            <button type="button" onclick="saveProfile()">Save Changes</button>
            <button type="button" onclick="location.href='profile.html';">Cancel</button>
        </footer>
        <script>
            function saveProfile() {
                // Placeholder for saving profile logic
                alert('Profile changes saved successfully!');
                // Redirect to profile page after saving
                location.href = 'profile.html';
            }
        </script>   
</html>
